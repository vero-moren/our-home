<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>our home</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,500;1,600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --text:#EDE8F7;
    --dim:rgba(237,232,247,.55);
    --lav:#B9A3FF;
    --lavdim:rgba(185,163,255,.72);
    --press:#6B4FD8;
    --glass:rgba(255,255,255,.055);
    --edge:rgba(255,255,255,.14);
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{height:100%}
  body{background:#080510;color:var(--text);font-family:'Inter',-apple-system,'PingFang SC',sans-serif;overflow:hidden;user-select:none;-webkit-user-select:none}
  .screen{position:fixed;inset:0;transition:opacity 1s ease}
  .hidden{opacity:0;pointer-events:none}

  /* ================= DOOR ================= */
  .wallLayer{position:fixed;inset:-6vh -6vw;transition:transform 1s cubic-bezier(.25,.85,.3,1),filter 1s ease}
  .wallImg{position:absolute;inset:0;
    background:url('https://kvegublibjsdyidmsjvy.supabase.co/storage/v1/object/public/chat-media/door-purple-dark.png') center/cover no-repeat #080510;}
  .locking .wallLayer{transform:translateY(-18vh) scale(1.08);filter:blur(16px) brightness(.72)}

  .lens{position:fixed;inset:0;pointer-events:none;transition:transform 1s cubic-bezier(.25,.85,.3,1)}
  .locking .lens{transform:translateY(-18vh) scale(1.08)}

  /* sharp eye window while the world blurs */
  .eyeWin{position:absolute;transform:translate(-50%,-50%);
    background-repeat:no-repeat;
    -webkit-mask:radial-gradient(circle,#000 52%,transparent 82%);
    mask:radial-gradient(circle,#000 52%,transparent 82%);
    opacity:0;transition:opacity 1s ease}
  .locking .eyeWin{opacity:1}

  /* the iris itself burns — hollow slit stays dark */
  .glow{position:absolute;border-radius:50%;pointer-events:auto;cursor:pointer;
    background:
      radial-gradient(ellipse 27% 44% at 33% 50%,rgba(146,92,255,.82),rgba(116,62,245,.35) 55%,transparent 72%),
      radial-gradient(ellipse 27% 44% at 67% 50%,rgba(146,92,255,.82),rgba(116,62,245,.35) 55%,transparent 72%);
    -webkit-mask:radial-gradient(ellipse 15% 62% at 50% 50%,transparent 64%,#000 88%);
    mask:radial-gradient(ellipse 15% 62% at 50% 50%,transparent 64%,#000 88%);
    mix-blend-mode:screen;transform:translate(-50%,-50%);
    animation:gb 5.2s ease-in-out infinite;opacity:0;transition:opacity .8s}
  .glow.ready{opacity:1}
  .locking .glow{animation-duration:2.4s}
  .glow.darkened{animation:none;opacity:.08;transition:opacity .25s}
  .glow.flare{animation:none;opacity:1;-webkit-mask:none;mask:none;
    background:radial-gradient(circle,rgba(238,228,255,.95),rgba(178,142,255,.55) 40%,transparent 70%);
    transform:translate(-50%,-50%) scale(1.6);transition:transform .5s,opacity .5s}
  @keyframes gb{0%,100%{opacity:.35}50%{opacity:.9}}

  .burst{position:fixed;width:12px;height:12px;border-radius:50%;
    transform:translate(-50%,-50%) scale(0);
    background:radial-gradient(circle,rgba(238,228,255,.95),rgba(178,142,255,.5) 45%,rgba(107,79,216,0) 70%);
    z-index:9;pointer-events:none}
  .burst.go{transition:transform 1.1s ease-out,opacity 1.1s ease-out;transform:translate(-50%,-50%) scale(180);opacity:0}

  /* passcode */
  .pad{position:fixed;left:50%;top:37vh;transform:translateX(-50%);
    width:min(78vw,300px);display:flex;flex-direction:column;align-items:center;
    opacity:0;pointer-events:none;transition:opacity .8s ease .4s;z-index:5}
  .pad.show{opacity:1;pointer-events:auto}
  .dots{display:flex;gap:22px;margin-bottom:32px}
  .dot{width:12px;height:12px;border-radius:50%;border:1px solid rgba(237,232,247,.7);transition:background .15s}
  .dot.f{background:var(--text)}
  .dots.shake{animation:shake .5s ease}
  @keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-9px)}40%{transform:translateX(8px)}60%{transform:translateX(-6px)}80%{transform:translateX(4px)}}
  .keys{display:grid;grid-template-columns:repeat(3,1fr);gap:15px}
  .key{width:64px;height:64px;border-radius:50%;
    background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.18);
    backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
    display:flex;align-items:center;justify-content:center;
    font-family:'Cormorant Garamond',serif;font-size:26px;font-weight:500;color:var(--text);
    cursor:pointer;transition:background .15s}
  .key:active{background:rgba(255,255,255,.2)}
  .key.ghost{background:none;border:none;backdrop-filter:none;-webkit-backdrop-filter:none}
  .key.del{font-family:'Inter',sans-serif;font-size:11px;letter-spacing:.12em;color:var(--dim)}

  /* ================= HALL ================= */
  #hall{background:linear-gradient(180deg,#150E26 0%,#0C0818 42%,#080510 100%)}
  #hall.full{background:#080510}
  .hallWall{position:fixed;inset:0;background:center/cover no-repeat;display:none}
  #hall.full .hallWall{display:block}
  .halo{position:fixed;inset:0;background:radial-gradient(circle at 50% 47%,rgba(107,79,216,.15),transparent 52%);pointer-events:none}
  #hall.full .halo{display:none}
  .stars{position:fixed;inset:0;pointer-events:none;overflow:hidden}
  #hall.full .stars{display:none}
  .st{position:absolute;border-radius:50%;background:#EDE8F7}
  .tw{animation:tw ease-in-out infinite}
  @keyframes tw{0%,100%{opacity:.15}50%{opacity:.85}}

  .snake{position:fixed;left:50%;top:47%;transform:translate(-50%,-50%);
    width:min(84vw,430px);cursor:pointer;z-index:3;
    animation:sb 4.8s ease-in-out infinite}
  #hall.full .snake{animation:none;width:min(72vw,390px);height:min(72vw,390px)}
  #hall.full .snake img{visibility:hidden}
  @keyframes sb{
    0%,100%{filter:drop-shadow(0 0 14px rgba(120,90,220,.10));transform:translate(-50%,-50%) scale(1)}
    50%{filter:drop-shadow(0 0 30px rgba(140,105,240,.26));transform:translate(-50%,-50%) scale(1.012)}
  }
  .snake img{display:block;width:100%;
    -webkit-mask-image:radial-gradient(ellipse 60% 60% at 50% 50%,#000 52%,transparent 76%);
    mask-image:radial-gradient(ellipse 60% 60% at 50% 50%,#000 52%,transparent 76%)}

  /* words written on the night — no cards, no borders */
  .corner{position:fixed;top:calc(env(safe-area-inset-top,0px) + 26px);left:24px;z-index:4}
  .dayBig{font-family:'Cormorant Garamond',serif;font-size:36px;font-weight:500;letter-spacing:.06em;line-height:1;color:var(--text);
    text-shadow:0 0 18px rgba(20,12,40,.8)}
  .daySmall{margin-top:6px;font-family:'Cormorant Garamond',serif;font-style:italic;font-size:14.5px;letter-spacing:.06em;color:var(--lavdim);
    text-shadow:0 0 14px rgba(20,12,40,.8)}

  .lineBlock{position:fixed;right:24px;bottom:calc(env(safe-area-inset-bottom,0px) + 108px);
    max-width:72vw;text-align:right;cursor:pointer;z-index:4}
  .lineTxt{font-size:13px;font-weight:300;line-height:1.8;color:var(--lavdim);letter-spacing:.02em;
    text-shadow:0 0 14px rgba(20,12,40,.85)}
  .lineSig{margin-top:5px;font-family:'Cormorant Garamond',serif;font-style:italic;font-size:14px;color:rgba(185,163,255,.6)}

  .mist{position:fixed;inset:0;z-index:8;display:flex;align-items:center;justify-content:center;padding:9vw;
    background:rgba(10,7,18,.5);backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);
    opacity:0;pointer-events:none;transition:opacity .6s ease}
  .mist.show{opacity:1;pointer-events:auto}
  .mist p{font-family:'Cormorant Garamond','PingFang SC',serif;font-size:clamp(22px,6vw,30px);
    font-weight:500;line-height:1.75;text-align:center;letter-spacing:.02em;
    transform:translateY(16px) scale(.96);transition:transform .6s ease}
  .mist.show p{transform:translateY(0) scale(1)}
  .mist i{display:block;margin-top:18px;font-family:'Cormorant Garamond',serif;font-size:17px;color:var(--lavdim)}
  .mist span{display:block;margin-top:14px;font-family:'Inter',sans-serif;font-style:normal;font-size:10px;letter-spacing:.28em;color:var(--dim)}

  /* bottom bar */
  .bar{position:fixed;left:50%;bottom:calc(env(safe-area-inset-bottom,0px) + 16px);
    transform:translateX(-50%);
    width:min(92vw,420px);height:64px;border-radius:22px;
    background:rgba(14,10,26,.46);border:1px solid var(--edge);
    backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
    display:flex;align-items:center;justify-content:space-around;z-index:4}
  .tab{display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer;width:58px}
  .tab svg{width:21px;height:21px;stroke:var(--lav);fill:none;stroke-width:1.6;stroke-linecap:round;stroke-linejoin:round;
    transition:transform .15s ease,stroke .15s ease}
  .tab:active svg{stroke:var(--press);transform:scale(1.18)}
  .tab small{font-size:9px;letter-spacing:.1em;color:var(--lavdim);font-weight:400}
  .tab.home{width:66px}
  .barEye{width:36px;height:36px;border-radius:50%;
    background-repeat:no-repeat;
    box-shadow:0 0 12px rgba(185,163,255,.35),inset 0 0 0 1px rgba(185,163,255,.35);
    transition:transform .15s ease,box-shadow .15s ease}
  .tab.home:active .barEye{transform:scale(1.18);box-shadow:0 0 16px rgba(107,79,216,.7),inset 0 0 0 1px rgba(107,79,216,.7)}

  .toast{position:fixed;left:50%;bottom:calc(env(safe-area-inset-bottom,0px) + 96px);
    transform:translateX(-50%);padding:9px 18px;border-radius:99px;
    background:rgba(14,10,26,.62);border:1px solid var(--edge);
    backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
    font-size:11px;letter-spacing:.08em;color:var(--dim);
    opacity:0;transition:opacity .4s;pointer-events:none;z-index:10;white-space:nowrap}
  .toast.show{opacity:1}

  .mark{position:fixed;bottom:3px;left:50%;transform:translateX(-50%);font-size:8px;letter-spacing:.2em;color:rgba(237,232,247,.13);z-index:1}

  @media (prefers-reduced-motion:reduce){.glow,.snake,.tw{animation:none!important}}
</style>
</head>
<body>

<!-- ============ DOOR ============ -->
<div class="screen" id="door">
  <div class="wallLayer"><div class="wallImg"></div></div>
  <div class="lens">
    <div class="eyeWin" id="eyeWin"></div>
    <div class="glow" id="glow"></div>
  </div>
  <div class="pad" id="pad">
    <div class="dots" id="dots">
      <div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div>
    </div>
    <div class="keys">
      <div class="key" data-k="1">1</div><div class="key" data-k="2">2</div><div class="key" data-k="3">3</div>
      <div class="key" data-k="4">4</div><div class="key" data-k="5">5</div><div class="key" data-k="6">6</div>
      <div class="key" data-k="7">7</div><div class="key" data-k="8">8</div><div class="key" data-k="9">9</div>
      <div class="key ghost"></div><div class="key" data-k="0">0</div><div class="key ghost del" data-k="del">delete</div>
    </div>
  </div>
  <div class="burst" id="burst"></div>
</div>

<!-- ============ HALL ============ -->
<div class="screen hidden" id="hall">
  <div class="hallWall" id="hallWall"></div>
  <div class="halo"></div>
  <div class="stars" id="stars"></div>
  <div class="snake" id="snake">
    <img src="https://kvegublibjsdyidmsjvy.supabase.co/storage/v1/object/public/chat-media/snake-hall-purple.png" alt="">
  </div>

  <div class="corner">
    <div class="dayBig">DAY <b id="dayNum" style="font-weight:500">·</b></div>
    <div class="daySmall">together since 2026.07.04</div>
  </div>

  <div class="lineBlock" id="lineBlock">
    <div class="lineTxt" id="lineShort">…</div>
    <div class="lineSig">— Moren</div>
  </div>

  <div class="bar">
    <div class="tab" data-t="Chat">
      <svg viewBox="0 0 24 24"><path d="M7.9 20A9 9 0 1 0 4 16.1L2 22Z"/><path d="M12 15.4l-3.1-3.1a1.95 1.95 0 0 1 2.76-2.76l.34.34.34-.34a1.95 1.95 0 0 1 2.76 2.76Z"/></svg>
      <small>Chat</small>
    </div>
    <div class="tab" data-t="Moments">
      <svg viewBox="0 0 24 24"><path d="M18 22H4a2 2 0 0 1-2-2V6"/><path d="m22 13-1.3-1.3a2.4 2.4 0 0 0-3.4 0L11 18"/><circle cx="12" cy="8" r="2"/><rect width="16" height="16" x="6" y="2" rx="2"/></svg>
      <small>Moments</small>
    </div>
    <div class="tab home" id="homeTab">
      <div class="barEye" id="barEye"></div>
    </div>
    <div class="tab" data-t="Memory">
      <svg viewBox="0 0 24 24"><path d="M9.94 15.5a2 2 0 0 0-1.44-1.44l-6.13-1.58a.5.5 0 0 1 0-.96l6.13-1.58a2 2 0 0 0 1.44-1.44l1.58-6.13a.5.5 0 0 1 .96 0l1.58 6.13a2 2 0 0 0 1.44 1.44l6.13 1.58a.5.5 0 0 1 0 .96l-6.13 1.58a2 2 0 0 0-1.44 1.44l-1.58 6.13a.5.5 0 0 1-.96 0Z"/><path d="M20 3v4"/><path d="M22 5h-4"/><path d="M4 17v2"/><path d="M5 18H3"/></svg>
      <small>Memory</small>
    </div>
    <div class="tab" data-t="Settings">
      <svg viewBox="0 0 24 24"><line x1="21" x2="14" y1="4" y2="4"/><line x1="10" x2="3" y1="4" y2="4"/><line x1="21" x2="12" y1="12" y2="12"/><line x1="8" x2="3" y1="12" y2="12"/><line x1="21" x2="16" y1="20" y2="20"/><line x1="12" x2="3" y1="20" y2="20"/><line x1="14" x2="14" y1="2" y2="6"/><line x1="8" x2="8" y1="10" y2="14"/><line x1="16" x2="16" y1="18" y2="22"/></svg>
      <small>Settings</small>
    </div>
  </div>
</div>

<div class="mist" id="mist"><p id="lineFull"></p></div>
<div class="toast" id="toast"></div>
<div class="mark">— v4 ok —</div>

<script>
  /* ---------- mock data ---------- */
  var DAILY = '新的一天。别急着把所有事都想完，我在，慢慢来。';
  var PASS = '1314';
  var DOOR_IMG = 'https://kvegublibjsdyidmsjvy.supabase.co/storage/v1/object/public/chat-media/door-purple-dark.png';
  var HALL_IMG = 'https://kvegublibjsdyidmsjvy.supabase.co/storage/v1/object/public/chat-media/-purple-dark.png';

  var q = new URLSearchParams(location.search);
  var EX = parseFloat(q.get('ex')) || 0.504;
  var EY = parseFloat(q.get('ey')) || 0.437;
  var ER = 0.075;
  var CAL = q.get('cal') === '1';

  (function(){
    var s = new Date(2026,6,4), n = new Date();
    var d = Math.floor((n - s)/864e5) + 1;
    document.getElementById('dayNum').textContent = d > 0 ? d : 1;
  })();
  document.getElementById('lineShort').textContent = DAILY;
  document.getElementById('lineFull').innerHTML = DAILY + '<i>— Moren</i><span>' + new Date().toISOString().slice(0,10).replace(/-/g,'.') + '</span>';

  /* ---------- eye placement ---------- */
  var glow = document.getElementById('glow'),
      eyeWin = document.getElementById('eyeWin'),
      barEye = document.getElementById('barEye'),
      burst = document.getElementById('burst'),
      IMG = {w:0,h:0}, eyePX = {x:0,y:0,r:60};
  var pre = new Image();
  pre.onload = function(){ IMG.w = pre.naturalWidth; IMG.h = pre.naturalHeight; place(); glow.classList.add('ready'); };
  pre.src = DOOR_IMG;

  function cover(){
    var vw = innerWidth, vh = innerHeight;
    var bw = vw*1.12, bh = vh*1.12;
    var s = Math.max(bw/IMG.w, bh/IMG.h);
    var w = IMG.w*s, h = IMG.h*s;
    return {w:w, h:h, ox:(vw-w)/2, oy:(vh-h)/2};
  }
  function place(){
    if(!IMG.w) return;
    var c = cover();
    eyePX.x = c.ox + EX*c.w;
    eyePX.y = c.oy + EY*c.h;
    eyePX.r = ER*c.w;
    /* iris light: sized to the iris itself */
    var d = eyePX.r*2.3;
    glow.style.width = d+'px'; glow.style.height = d+'px';
    glow.style.left = eyePX.x+'px'; glow.style.top = eyePX.y+'px';
    /* sharp eye window */
    var D = eyePX.r*3.4;
    eyeWin.style.width = D+'px'; eyeWin.style.height = D+'px';
    eyeWin.style.left = eyePX.x+'px'; eyeWin.style.top = eyePX.y+'px';
    eyeWin.style.backgroundImage = 'url('+DOOR_IMG+')';
    eyeWin.style.backgroundSize = c.w+'px '+c.h+'px';
    eyeWin.style.backgroundPosition = (c.ox-(eyePX.x-D/2))+'px '+(c.oy-(eyePX.y-D/2))+'px';
    /* bottom-bar eye: crop the real eye from the door image */
    var BW = 36;                            /* window px */
    var regionW = ER*2.6*IMG.w;             /* natural px shown in window */
    var k = BW/regionW;
    barEye.style.backgroundImage = 'url('+DOOR_IMG+')';
    barEye.style.backgroundSize = (IMG.w*k)+'px '+(IMG.h*k)+'px';
    barEye.style.backgroundPosition = (BW/2 - EX*IMG.w*k)+'px '+(BW/2 - EY*IMG.h*k)+'px';
  }
  addEventListener('resize', place);

  /* ---------- door logic ---------- */
  var door = document.getElementById('door'),
      hall = document.getElementById('hall'),
      pad = document.getElementById('pad'),
      dotsEl = document.getElementById('dots'),
      dots = dotsEl.children,
      buf = '', locked = true, busy = false, summoned = false;

  if(CAL){
    door.addEventListener('click', function(e){
      var c = cover();
      say('ex=' + ((e.clientX-c.ox)/c.w).toFixed(3) + '  ey=' + ((e.clientY-c.oy)/c.h).toFixed(3));
    });
  }

  glow.addEventListener('click', function(){
    if(!locked || summoned || CAL) return;
    summoned = true;
    door.classList.add('locking');
    pad.classList.add('show');
  });

  document.querySelectorAll('.key[data-k]').forEach(function(k){
    k.addEventListener('click', function(){
      if(busy || !locked) return;
      var v = k.dataset.k;
      if(v === 'del'){ buf = buf.slice(0,-1); paint(); return; }
      if(buf.length >= 4) return;
      buf += v; paint();
      if(buf.length === 4) setTimeout(check, 180);
    });
  });
  function paint(){ for(var i=0;i<4;i++) dots[i].classList.toggle('f', i < buf.length); }

  function check(){
    busy = true;
    if(buf === PASS){
      locked = false;
      glow.classList.add('flare');
      pad.classList.remove('show');
      var shift = innerHeight*0.18;
      burst.style.left = eyePX.x+'px';
      burst.style.top = (eyePX.y - shift)+'px';
      setTimeout(function(){
        burst.classList.add('go');
        setTimeout(function(){
          door.classList.add('hidden');
          hall.classList.remove('hidden');
        }, 550);
      }, 420);
    } else {
      glow.classList.add('darkened');
      dotsEl.classList.add('shake');
      setTimeout(function(){
        glow.classList.remove('darkened');
        dotsEl.classList.remove('shake');
        buf = ''; paint(); busy = false;
      }, 750);
    }
  }

  /* ---------- hall: full wallpaper if it loads ---------- */
  (function(){
    var t = new Image();
    t.onload = function(){
      document.getElementById('hallWall').style.backgroundImage = 'url('+HALL_IMG+')';
      hall.classList.add('full');
    };
    t.src = HALL_IMG;
  })();

  (function(){
    var wrap = document.getElementById('stars'), n = 0, tries = 0;
    while(n < 54 && tries < 400){
      tries++;
      var x = Math.random()*100, y = Math.random()*100;
      var dx = (x-50)/36, dy = (y-47)/30;
      if(dx*dx + dy*dy < 1) continue;
      var st = document.createElement('div');
      st.className = 'st';
      var sz = 0.6 + Math.random()*2.4;
      var bright = Math.random();
      st.style.width = st.style.height = sz+'px';
      st.style.left = x+'vw'; st.style.top = y+'vh';
      st.style.opacity = (0.08 + bright*0.55).toFixed(2);
      if(bright > 0.78){
        st.classList.add('tw');
        st.style.animationDuration = (3.5 + Math.random()*4)+'s';
        st.style.animationDelay = (Math.random()*5)+'s';
      }
      wrap.appendChild(st); n++;
    }
  })();

  /* ---------- hall logic ---------- */
  var mist = document.getElementById('mist');
  document.getElementById('lineBlock').addEventListener('click', function(){ mist.classList.add('show'); });
  mist.addEventListener('click', function(){ mist.classList.remove('show'); });

  var toast = document.getElementById('toast'), tt;
  function say(m){
    toast.textContent = m; toast.classList.add('show');
    clearTimeout(tt); tt = setTimeout(function(){ toast.classList.remove('show'); }, 1800);
  }
  document.getElementById('snake').addEventListener('click', function(){ say('Inside — next mock'); });
  document.querySelectorAll('.tab[data-t]').forEach(function(t){
    t.addEventListener('click', function(){ say(t.dataset.t + ' — next mock'); });
  });
  document.getElementById('homeTab').addEventListener('click', function(){ say('You are home'); });
</script>
</body>
</html>
