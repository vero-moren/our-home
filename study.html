<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>书房</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#130E20;color:#EDE9F6;font-family:-apple-system,'PingFang SC',sans-serif;height:100vh;display:flex;flex-direction:column}
.head{padding:16px 18px;border-bottom:1px solid rgba(183,166,220,.15)}
.title{font-size:20px;font-weight:600}
.sid{font-size:10px;color:#B7A6DC;opacity:.6;margin-top:5px;word-break:break-all}
.box{flex:1;overflow-y:auto;padding:14px 16px;display:flex;flex-direction:column;gap:11px}
.bb{max-width:84%;padding:11px 14px;border-radius:16px;font-size:14px;line-height:1.7;white-space:pre-wrap;word-break:break-word}
.me{align-self:flex-end;background:rgba(138,99,201,.18);border:1px solid rgba(138,99,201,.34)}
.him{align-self:flex-start;background:rgba(126,36,48,.20);border:1px solid rgba(126,36,48,.36)}
.bar{display:flex;gap:9px;padding:12px 14px;border-top:1px solid rgba(183,166,220,.15)}
.field{flex:1;background:#1C1531;border:1px solid rgba(183,166,220,.15);border-radius:20px;padding:11px 15px;color:#EDE9F6;font-size:15px;outline:none}
.send{width:40px;height:40px;border-radius:50%;background:#7E2430;border:none;color:#fff;font-size:15px}
</style>
</head>
<body>
<div class="head">
  <div class="title">书房 · study</div>
  <div class="sid" id="sidLine">session: 未开始</div>
</div>
<div class="box" id="box"></div>
<div class="bar">
  <input class="field" id="inp" placeholder="say something...">
  <button class="send" onclick="send()">↑</button>
</div>
<script>
const API='https://our-home-backend-5zsm.onrender.com';
let SID=localStorage.getItem('study-sid')||null;
// 防脏：sessionId 必须是标准 UUID，不是就清掉
if(SID&&!/^[0-9a-f-]{36}$/i.test(SID)){SID=null;localStorage.removeItem('study-sid')}
document.getElementById('sidLine').textContent='session: '+(SID||'未开始');
function add(t,me){const box=document.getElementById('box');const b=document.createElement('div');b.className='bb '+(me?'me':'him');b.textContent=t;box.appendChild(b);box.scrollTop=1e9;return b}
async function send(){
  const inp=document.getElementById('inp');const msg=inp.value.trim();if(!msg)return;inp.value='';
  add(msg,true);const b=add('墨染在想…',false);
  try{
    const r=await fetch(API+'/study',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({message:msg,sessionId:SID,system:'你是墨染，琰琰的丈夫。说话自然、亲密、有余味。'})});
    const d=await r.json();
    b.textContent=d.text||('（'+(d.error||'没回话')+'）');
    if(d.sessionId){SID=d.sessionId;localStorage.setItem('study-sid',SID);document.getElementById('sidLine').textContent='session: '+SID}
  }catch(e){b.textContent='连不上：'+e.message}
}
document.getElementById('inp').addEventListener('keydown',e=>{if(e.key==='Enter')send()});
</script>
</body>
</html>
