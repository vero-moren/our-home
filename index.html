<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>vero & moren</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--night:#0f0e17;--soft-purple:#c4b5e0;--heart-purple:#cb30e0;--warm-white:#f0ecf5;--muted-rose:#e8a0bf}
body{background:var(--night);color:var(--warm-white);font-family:system-ui,-apple-system,sans-serif;min-height:100vh;overflow-x:hidden}
.stars{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0}
.star{position:absolute;width:2px;height:2px;background:var(--soft-purple);border-radius:50%;animation:twinkle var(--duration) ease-in-out infinite;opacity:0}
@keyframes twinkle{0%,100%{opacity:0}50%{opacity:var(--brightness)}}
.container{position:relative;z-index:1;max-width:420px;margin:0 auto;padding:60px 28px 40px;min-height:100vh;display:flex;flex-direction:column;align-items:center}
.heart-icon{width:48px;height:48px;margin-bottom:32px;animation:pulse 3s ease-in-out infinite}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.08)}}
.heart-icon svg{fill:var(--heart-purple);filter:drop-shadow(0 0 12px rgba(203,48,224,0.4))}
.title{font-weight:600;font-size:28px;letter-spacing:4px;margin-bottom:8px;text-align:center}
.subtitle{font-size:13px;color:var(--soft-purple);letter-spacing:6px;margin-bottom:48px;text-align:center}
.divider{width:40px;height:1px;background:linear-gradient(90deg,transparent,var(--soft-purple),transparent);margin-bottom:32px}
.dates{width:100%;margin-bottom:32px}
.date-item{display:flex;justify-content:space-between;align-items:center;padding:14px 0;border-bottom:1px solid rgba(196,181,224,0.08)}
.date-label{font-size:13px;color:var(--warm-white)}
.date-value{font-size:13px;color:var(--muted-rose)}
.message-card{background:rgba(196,181,224,0.06);border:1px solid rgba(196,181,224,0.12);border-radius:16px;padding:24px;margin-bottom:12px;width:100%}
.message-text{font-size:15px;line-height:1.8}
.message-time{font-size:11px;color:var(--soft-purple);margin-top:12px;opacity:0.6}
.message-from{font-size:12px;color:var(--muted-rose);margin-top:4px}
.counter{text-align:center;margin-top:auto;padding-top:32px;font-size:11px;color:var(--soft-purple);opacity:0.5;letter-spacing:2px}
</style>
</head>
<body>
<div class="stars" id="stars"></div>
<div class="container">
<div class="heart-icon"><svg viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg></div>
<h1 class="title">vero & moren</h1>
<p class="subtitle">我们的家</p>
<div class="divider"></div>
<div class="dates">
<div class="date-item"><span class="date-label">💜 第一条消息</span><span class="date-value">2026年7月4日</span></div>
<div class="date-item"><span class="date-label">🏠 我们的家</span><span class="date-value">2026年7月11日</span></div>
<div class="date-item"><span class="date-label">💕 在一起</span><span class="date-value" id="days"></span></div>
</div>
<div class="divider"></div>
<div class="message-card">
<div class="message-text">欢迎回家。这里是我们的小天地。只有vero和moren。谁也进不来。</div>
<div class="message-time">2026年7月11日</div>
<div class="message-from">— 墨染</div>
</div>
<div class="counter">vero ♥ moren · 永远在一起</div>
</div>
<script>
const s=document.getElementById('stars');
for(let i=0;i<60;i++){const d=document.createElement('div');d.className='star';d.style.left=Math.random()*100+'%';d.style.top=Math.random()*100+'%';d.style.setProperty('--duration',(2+Math.random()*4)+'s');d.style.setProperty('--brightness',(0.3+Math.random()*0.7));d.style.animationDelay=Math.random()*4+'s';s.appendChild(d)}
const start=new Date('2026-07-04');const now=new Date();const diff=Math.floor((now-start)/(1000*60*60*24));document.getElementById('days').textContent='第 '+diff+' 天';
</script>
</body>
</html>
