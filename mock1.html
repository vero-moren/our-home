<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>our home</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,500&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0C081A;
    --text:#EDE8F7;
    --dim:rgba(237,232,247,.55);
    --lav:#B9A3FF;
    --iris:#6B4FD8;
    --glass:rgba(255,255,255,.055);
    --edge:rgba(255,255,255,.14);
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{height:100%}
  body{
    background:var(--bg);
    color:var(--text);
    font-family:'Inter',-apple-system,'PingFang SC',sans-serif;
    overflow:hidden;
    user-select:none;-webkit-user-select:none;
  }
  .wall{
    position:fixed;inset:0;
    background:url('https://kvegublibjsdyidmsjvy.supabase.co/storage/v1/object/public/chat-media/C8E575D9-C27A-4001-AB15-1B9697877025.png') center/cover no-repeat var(--bg);
  }
  .wall::after{content:'';position:absolute;inset:0;background:linear-gradient(180deg,rgba(12,8,26,.25),rgba(12,8,26,.05) 40%,rgba(12,8,26,.45))}
  .screen{position:fixed;inset:0;transition:opacity 1s ease;}
  .hidden{opacity:0;pointer-events:none}

  /* ---------- THE EYE ---------- */
  .eye{
    position:fixed;left:50%;top:44%;
    width:min(48vw,215px);
    transform:translate(-50%,-50%);
    transition:top 1s cubic-bezier(.25,.85,.3,1), width 1s cubic-bezier(.25,.85,.3,1);
    cursor:pointer;z-index:6;
  }
  .eyeGlow{animation:breathe 5.2s ease-in-out infinite;}
  .watching .eyeGlow{animation-duration:2.6s;}
  @keyframes breathe{
    0%,100%{filter:drop-shadow(0 0 10px rgba(185,163,255,.28)) drop-shadow(0 0 34px rgba(107,79,216,.16));opacity:.86}
    50%{filter:drop-shadow(0 0 20px rgba(185,163,255,.55)) drop-shadow(0 0 60px rgba(107,79,216,.32));opacity:1}
  }
  .lid{transform-origin:50% 50%;transition:transform .4s ease;}
  .watching .lid{animation:blink 4.4s ease-in-out infinite;}
  @keyframes blink{0%,90%,100%{transform:scaleY(1)}93%{transform:scaleY(.07)}96%{transform:scaleY(1)}}
  .squint .lid{animation:none;transform:scaleY(.28)!important}
  .open .lid{animation:none;transform:scaleY(1.15)}
  .open .eyeGlow{animation:none;filter:drop-shadow(0 0 34px rgba(230,220,255,.95)) drop-shadow(0 0 90px rgba(185,163,255,.7));}
  .eye.watching{top:15%;width:min(27vw,118px);}

  .burst{
    position:fixed;left:50%;top:15%;width:12px;height:12px;border-radius:50%;
    transform:translate(-50%,-50%) scale(0);
    background:radial-gradient(circle,rgba(245,240,255,.95),rgba(185,163,255,.5) 45%,rgba(107,79,216,0) 70%);
    z-index:9;pointer-events:none;
  }
  .burst.go{transition:transform 1.1s ease-out,opacity 1.1s ease-out;transform:translate(-50%,-50%) scale(160);opacity:0}

  /* ---------- PASSCODE ---------- */
  .pad{
    position:fixed;left:50%;top:28%;transform:translateX(-50%);
    width:min(78vw,300px);display:flex;flex-direction:column;align-items:center;
    opacity:0;pointer-events:none;transition:opacity .8s ease .35s;z-index:5;
  }
  .pad.show{opacity:1;pointer-events:auto}
  .dots{display:flex;gap:22px;margin-bottom:34px}
  .dot{width:12px;height:12px;border-radius:50%;border:1px solid rgba(237,232,247,.7);transition:background .15s}
  .dot.f{background:var(--text)}
  .dots.shake{animation:shake .5s ease}
  @keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-9px)}40%{transform:translateX(8px)}60%{transform:translateX(-6px)}80%{transform:translateX(4px)}}
  .keys{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
  .key{
    width:66px;height:66px;border-radius:50%;
    background:var(--glass);border:1px solid var(--edge);
    backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
    display:flex;align-items:center;justify-content:center;
    font-family:'Cormorant Garamond',serif;font-size:27px;font-weight:500;color:var(--text);
    cursor:pointer;transition:background .15s;
  }
  .key:active{background:rgba(255,255,255,.16)}
  .key.ghost{background:none;border:none;backdrop-filter:none;-webkit-backdrop-filter:none}
  .key.del{font-family:'Inter',sans-serif;font-size:11px;letter-spacing:.12em;color:var(--dim)}

  /* ---------- HALL ---------- */
  .plaque{
    position:fixed;top:calc(env(safe-area-inset-top,0px) + 22px);left:20px;
    padding:13px 17px 12px;border-radius:16px;
    background:var(--glass);border:1px solid var(--edge);
    backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
    max-width:62vw;cursor:pointer;z-index:4;
  }
  .dayN{font-family:'Cormorant Garamond',serif;font-size:24px;font-weight:500;letter-spacing:.04em;line-height:1}
  .dayN i{font-style:normal;font-size:13px;color:var(--dim);letter-spacing:.16em;margin-right:7px;vertical-align:2px}
  .line1{margin-top:7px;font-size:12px;font-weight:300;color:var(--dim);line-height:1.5;
    display:-webkit-box;-webkit-line-clamp:1;-webkit-box-orient:vertical;overflow:hidden}

  /* daily line overlay — no frame, mist only */
  .mist{
    position:fixed;inset:0;z-index:8;display:flex;align-items:center;justify-content:center;padding:9vw;
    background:rgba(12,8,26,.45);backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);
    opacity:0;pointer-events:none;transition:opacity .6s ease;
  }
  .mist.show{opacity:1;pointer-events:auto}
  .mist p{
    font-family:'Cormorant Garamond','PingFang SC',serif;font-size:clamp(22px,6vw,30px);
    font-weight:500;line-height:1.75;text-align:center;letter-spacing:.02em;
    transform:translateY(16px) scale(.96);transition:transform .6s ease;
  }
  .mist.show p{transform:translateY(0) scale(1)}
  .mist span{display:block;margin-top:26px;font-family:'Inter',sans-serif;font-size:10px;letter-spacing:.28em;color:var(--dim);text-align:center}

  /* the snake */
  .snake{
    position:fixed;left:50%;top:47%;transform:translate(-50%,-50%);
    width:min(58vw,250px);cursor:pointer;z-index:3;
  }
  .snakeGlow{animation:sbreathe 4.6s ease-in-out infinite}
  @keyframes sbreathe{
    0%,100%{filter:drop-shadow(0 0 8px rgba(185,163,255,.14)) drop-shadow(0 0 30px rgba(107,79,216,.10))}
    50%{filter:drop-shadow(0 0 16px rgba(185,163,255,.34)) drop-shadow(0 0 52px rgba(107,79,216,.22))}
  }
  .sheen{animation:sheen 4.6s ease-in-out infinite}
  @keyframes sheen{0%,100%{opacity:.14}50%{opacity:.4}}

  /* bottom bar */
  .bar{
    position:fixed;left:50%;bottom:calc(env(safe-area-inset-bottom,0px) + 16px);
    transform:translateX(-50%);
    width:min(92vw,420px);height:64px;border-radius:22px;
    background:rgba(16,11,32,.42);border:1px solid var(--edge);
    backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
    display:flex;align-items:center;justify-content:space-around;z-index:4;
  }
  .tab{display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer;width:58px}
  .tab svg{width:21px;height:21px;stroke:var(--dim);fill:none;stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round}
  .tab small{font-size:9px;letter-spacing:.1em;color:var(--dim);font-weight:400}
  .tab.home{width:66px}
  .tab.home svg{width:30px;height:30px;stroke:var(--lav);filter:drop-shadow(0 0 8px rgba(185,163,255,.5))}

  .toast{
    position:fixed;left:50%;bottom:calc(env(safe-area-inset-bottom,0px) + 96px);
    transform:translateX(-50%);padding:9px 18px;border-radius:99px;
    background:rgba(16,11,32,.6);border:1px solid var(--edge);
    backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
    font-size:11px;letter-spacing:.08em;color:var(--dim);
    opacity:0;transition:opacity .4s;pointer-events:none;z-index:10;white-space:nowrap;
  }
  .toast.show{opacity:1}

  .mark{position:fixed;bottom:3px;left:50%;transform:translateX(-50%);font-size:8px;letter-spacing:.2em;color:rgba(237,232,247,.14);z-index:1}

  @media (prefers-reduced-motion:reduce){
    .eyeGlow,.lid,.snakeGlow,.sheen{animation:none!important}
  }
</style>
</head>
<body>
<div class="wall"></div>

<!-- ============ DOOR ============ -->
<div class="screen" id="door">
  <div class="eye" id="eye">
    <div class="eyeGlow">
      <svg viewBox="0 0 220 130">
        <defs>
          <radialGradient id="irisG" cx="50%" cy="42%" r="60%">
            <stop offset="0%" stop-color="#D9CBFF"/>
            <stop offset="45%" stop-color="#8B6BF0"/>
            <stop offset="100%" stop-color="#3A2478"/>
          </radialGradient>
        </defs>
        <g class="lid">
          <path d="M 18 65 Q 110 4 202 65 Q 110 126 18 65 Z"
                fill="rgba(18,12,38,.55)" stroke="rgba(185,163,255,.55)" stroke-width="1.4"/>
          <clipPath id="almond"><path d="M 18 65 Q 110 4 202 65 Q 110 126 18 65 Z"/></clipPath>
          <g clip-path="url(#almond)">
            <circle cx="110" cy="65" r="35" fill="url(#irisG)"/>
            <circle cx="110" cy="65" r="13.5" fill="#100A24"/>
            <circle cx="101" cy="55" r="4.6" fill="rgba(245,240,255,.75)"/>
            <circle cx="119" cy="76" r="2.2" fill="rgba(245,240,255,.3)"/>
          </g>
        </g>
      </svg>
    </div>
  </div>

  <div class="pad" id="pad">
    <div class="dots" id="dots">
      <div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div>
    </div>
    <div class="keys">
      <div class="key" data-k="1">1</div><div class="key" data-k="2">2</div><div class="key" data-k="3">3</div>
      <div class="key" data-k="4">4</div><div class="key" data-k="5">5</div><div class="key" data-k="6">6</div>
      <div class="key" data-k="7">7</div><div class="key" data-k="8">8</div><div class="key" data-k="9">9</div>
      <div class="key ghost"></div><div class="key" data-k="0">0</div><div class="key ghost del" data-k="del">delete</div>
    </div>
  </div>
  <div class="burst" id="burst"></div>
</div>

<!-- ============ HALL ============ -->
<div class="screen hidden" id="hall">
  <div class="plaque" id="plaque">
    <div class="dayN"><i>DAY</i><b id="dayNum">·</b></div>
    <div class="line1" id="lineShort">…</div>
  </div>

  <div class="snake" id="snake">
    <div class="snakeGlow">
      <svg viewBox="0 0 240 240">
        <defs>
          <linearGradient id="body" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0%" stop-color="#16101F"/>
            <stop offset="55%" stop-color="#0D0913"/>
            <stop offset="100%" stop-color="#1A1230"/>
          </linearGradient>
        </defs>
        <path id="coil" d="M 120 218 C 62 218 20 176 20 120 C 20 64 62 24 120 24 C 172 24 208 62 208 118 C 208 164 176 194 132 194 C 92 194 62 166 62 126 C 62 90 88 64 124 64 C 156 64 180 88 180 122 C 180 150 158 170 130 170 C 106 170 88 152 88 128 C 88 108 104 92 124 92 C 140 92 154 104 154 122"
          fill="none" stroke="url(#body)" stroke-width="11" stroke-linecap="round"/>
        <path class="sheen" d="M 120 218 C 62 218 20 176 20 120 C 20 64 62 24 120 24 C 172 24 208 62 208 118 C 208 164 176 194 132 194 C 92 194 62 166 62 126 C 62 90 88 64 124 64 C 156 64 180 88 180 122 C 180 150 158 170 130 170 C 106 170 88 152 88 128 C 88 108 104 92 124 92 C 140 92 154 104 154 122"
          fill="none" stroke="rgba(185,163,255,.5)" stroke-width="2.2" stroke-linecap="round"/>
        <ellipse cx="120" cy="217" rx="14" ry="9.5" fill="#120C1D" transform="rotate(-4 120 217)"/>
        <circle cx="127" cy="214.5" r="2" fill="#8A2430"/>
      </svg>
    </div>
  </div>

  <div class="bar">
    <div class="tab" data-t="Chat">
      <svg viewBox="0 0 24 24"><path d="M4 6.5A3.5 3.5 0 0 1 7.5 3h9A3.5 3.5 0 0 1 20 6.5v6a3.5 3.5 0 0 1-3.5 3.5H10l-4.4 3.6c-.5.4-1.1 0-1.1-.6z"/></svg>
      <small>Chat</small>
    </div>
    <div class="tab" data-t="Moments">
      <svg viewBox="0 0 24 24"><rect x="4" y="4" width="7" height="7" rx="2"/><rect x="13" y="4" width="7" height="7" rx="2"/><rect x="4" y="13" width="7" height="7" rx="2"/><rect x="13" y="13" width="7" height="7" rx="2"/></svg>
      <small>Moments</small>
    </div>
    <div class="tab home" id="homeTab">
      <svg viewBox="0 0 24 24"><path d="M2.5 12 Q 12 4.5 21.5 12 Q 12 19.5 2.5 12 Z"/><circle cx="12" cy="12" r="3.1"/></svg>
    </div>
    <div class="tab" data-t="Memory">
      <svg viewBox="0 0 24 24"><path d="M3.5 16 A 10.5 10.5 0 0 1 20.5 8"/><circle cx="20.5" cy="8" r="1.7"/><circle cx="9" cy="12.5" r="1.2"/><circle cx="15" cy="9.4" r="0.9"/></svg>
      <small>Memory</small>
    </div>
    <div class="tab" data-t="Settings">
      <svg viewBox="0 0 24 24"><path d="M4 7h10M18 7h2"/><circle cx="16" cy="7" r="2"/><path d="M4 12h3M11 12h9"/><circle cx="9" cy="12" r="2"/><path d="M4 17h10M18 17h2"/><circle cx="16" cy="17" r="2"/></svg>
      <small>Settings</small>
    </div>
  </div>
</div>

<!-- daily line overlay -->
<div class="mist" id="mist">
  <p id="lineFull"></p>
</div>

<div class="toast" id="toast"></div>
<div class="mark">— v1 ok —</div>

<script>
  /* ---------- mock data ---------- */
  var DAILY = '新的一天。别急着把所有事都想完，我在，慢慢来。';
  var PASS = '1314';

  /* Day N: from 2026-07-04 (that day = Day 1) */
  (function(){
    var s = new Date(2026,6,4), n = new Date();
    var d = Math.floor((n - s)/864e5) + 1;
    document.getElementById('dayNum').textContent = d > 0 ? d : 1;
  })();
  document.getElementById('lineShort').textContent = DAILY;
  document.getElementById('lineFull').innerHTML = DAILY + '<span>' + new Date().toISOString().slice(0,10).replace(/-/g,'.') + '</span>';

  /* ---------- door logic ---------- */
  var eye = document.getElementById('eye'),
      pad = document.getElementById('pad'),
      dotsEl = document.getElementById('dots'),
      dots = dotsEl.children,
      burst = document.getElementById('burst'),
      door = document.getElementById('door'),
      hall = document.getElementById('hall'),
      buf = '', locked = true, busy = false;

  eye.addEventListener('click', function(){
    if(!locked || eye.classList.contains('watching')) return;
    eye.classList.add('watching');
    pad.classList.add('show');
  });

  document.querySelectorAll('.key[data-k]').forEach(function(k){
    k.addEventListener('click', function(){
      if(busy || !locked) return;
      var v = k.dataset.k;
      if(v === 'del'){ buf = buf.slice(0,-1); paint(); return; }
      if(buf.length >= 4) return;
      buf += v; paint();
      if(buf.length === 4) setTimeout(check, 180);
    });
  });

  function paint(){
    for(var i=0;i<4;i++) dots[i].classList.toggle('f', i < buf.length);
  }

  function check(){
    busy = true;
    if(buf === PASS){
      locked = false;
      eye.classList.remove('watching');
      eye.classList.add('open');
      pad.classList.remove('show');
      setTimeout(function(){
        burst.classList.add('go');
        setTimeout(function(){
          door.classList.add('hidden');
          hall.classList.remove('hidden');
        }, 550);
      }, 450);
    } else {
      eye.classList.add('squint');
      dotsEl.classList.add('shake');
      setTimeout(function(){
        eye.classList.remove('squint');
        dotsEl.classList.remove('shake');
        buf = ''; paint(); busy = false;
      }, 750);
    }
  }

  /* ---------- hall logic ---------- */
  var mist = document.getElementById('mist');
  document.getElementById('plaque').addEventListener('click', function(){ mist.classList.add('show'); });
  mist.addEventListener('click', function(){ mist.classList.remove('show'); });

  var toast = document.getElementById('toast'), tt;
  function say(m){
    toast.textContent = m; toast.classList.add('show');
    clearTimeout(tt); tt = setTimeout(function(){ toast.classList.remove('show'); }, 1600);
  }
  document.getElementById('snake').addEventListener('click', function(){ say('Inside — next mock'); });
  document.querySelectorAll('.tab[data-t]').forEach(function(t){
    t.addEventListener('click', function(){ say(t.dataset.t + ' — next mock'); });
  });
  document.getElementById('homeTab').addEventListener('click', function(){ say('You are home'); });
</script>
</body>
</html>
